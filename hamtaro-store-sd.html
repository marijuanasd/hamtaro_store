<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hamtaro Store | متجر همتارو</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-database-compat.js"></script>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    
    <style>
        :root { 
            --red: #ff4757; 
            --black: #1e1e1e; 
            --white: #ffffff; 
            --gray: #f9f9f9; 
            --gold: #f1c40f;
        }
        
        * { box-sizing: border-box; font-family: 'Cairo', sans-serif; transition: 0.3s; }
        body { background: var(--gray); margin: 0; padding-bottom: 20px; color: var(--black); }

        /* Header & Logo */
        header {
            background: linear-gradient(135deg, var(--black) 0%, #333 100%);
            padding: 40px 10px; text-align: center;
            border-bottom: 5px solid var(--red); color: white;
            border-radius: 0 0 50px 50px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
        }
        .logo-img {
            width: 110px; height: 110px; border-radius: 50%;
            border: 4px solid var(--red); background: white;
            padding: 5px; margin-bottom: 10px;
            box-shadow: 0 0 20px rgba(255, 71, 87, 0.4);
        }

        /* Features Bar (جودة - ثقة - ضمان) */
        .features-bar {
            display: flex; justify-content: space-around;
            padding: 20px 10px; background: white;
            margin: -25px 20px 20px 20px; border-radius: 15px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            text-align: center;
        }
        .feat-item { flex: 1; }
        .feat-item i { color: var(--red); font-size: 1.5rem; margin-bottom: 5px; }
        .feat-item p { margin: 0; font-weight: bold; font-size: 0.8rem; }

        /* Floating Cart Button */
        .cart-toggle {
            position: fixed; top: 20px; right: 20px;
            background: var(--red); color: white;
            width: 60px; height: 60px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-size: 1.5rem; cursor: pointer; z-index: 1001;
            box-shadow: 0 5px 15px rgba(255, 71, 87, 0.4);
        }
        .cart-count {
            position: absolute; top: 0; right: 0;
            background: var(--gold); color: var(--black);
            font-size: 0.8rem; font-weight: bold;
            width: 22px; height: 22px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
        }

        /* Product Grid */
        .grid { 
            display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); 
            gap: 15px; padding: 15px; max-width: 1000px; margin: auto;
        }
        .card {
            background: var(--white); border-radius: 20px; overflow: hidden;
            display: flex; flex-direction: column; border: 1px solid #eee;
        }
        .card:hover { transform: translateY(-5px); box-shadow: 0 10px 20px rgba(0,0,0,0.1); }
        .card img { width: 100%; height: 160px; object-fit: cover; }
        .card-info { padding: 12px; text-align: center; }
        .price { color: var(--red); font-weight: 800; font-size: 1.2rem; }

        /* Buttons */
        .buy-btn {
            background: var(--red); color: white; border: none;
            width: 100%; padding: 12px; border-radius: 12px;
            font-size: 0.9rem; font-weight: bold; cursor: pointer; margin-top: 10px;
        }
        .buy-btn:active { transform: scale(0.95); }

        /* Modal Layout */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 2000; padding: 20px; align-items: center; justify-content: center;}
        .modal-content { background: white; padding: 25px; border-radius: 25px; max-width: 450px; width: 100%; max-height: 85vh; overflow-y: auto; }
        input { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ddd; border-radius: 10px; }

        /* Footer & Social Media */
        footer {
            text-align: center; padding: 40px 20px; margin-top: 40px;
            background: var(--black); color: #fff; border-radius: 40px 40px 0 0;
        }
        .social-icons { margin: 20px 0; }
        .social-icons a { 
            color: white; font-size: 1.8rem; margin: 0 15px; 
            text-decoration: none; display: inline-block;
        }
        .social-icons a.fb:hover { color: #1877f2; }
        .social-icons a.ig:hover { color: #e4405f; }
        .social-icons a.tk:hover { color: #ff0050; }
        .copyright { font-size: 0.8rem; opacity: 0.6; margin-top: 10px; }

        .lock-btn { position: fixed; bottom: 20px; left: 20px; background: var(--black); color: white; width: 45px; height: 45px; border-radius: 50%; border: none; z-index: 1000; cursor: pointer; }
        .admin-box { display: none; background: white; margin: 20px; padding: 20px; border-radius: 20px; border: 2px solid var(--red); }
        .loading-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: white; display: flex; align-items: center; justify-content: center; z-index: 9999; }
    </style>
</head>
<body>

<div id="loading" class="loading-overlay"><h3>جاري تحميل المتجر...</h3></div>

<div class="cart-toggle" onclick="showCart()">
    <i class="fas fa-shopping-basket"></i>
    <div class="cart-count" id="cartCount">0</div>
</div>

<header>
    <img src="1000066242.jpg" class="logo-img" alt="Hamtaro Store">
    <h1 style="margin:0; font-size: 1.8rem;">HAMTARO STORE</h1>
    <p style="font-size: 0.9rem; opacity: 0.8;">التميز والجودة في مكان واحد</p>
</header>

<div class="features-bar">
    <div class="feat-item">
        <i class="fas fa-award"></i>
        <p>جودة عالية</p>
    </div>
    <div class="feat-item">
        <i class="fas fa-shield-alt"></i>
        <p>ثقة تامة</p>
    </div>
    <div class="feat-item">
        <i class="fas fa-check-circle"></i>
        <p>ضمان أكيد</p>
    </div>
</div>

<button class="lock-btn" onclick="askPass()"><i class="fas fa-cog"></i></button>

<div id="adminArea" class="admin-box">
    <h3 style="text-align:center">إضافة منتج جديد</h3>
    <input type="text" id="pName" placeholder="اسم المنتج">
    <input type="number" id="pPrice" placeholder="السعر">
    <input type="text" id="pLoc" placeholder="الموقع">
    <textarea id="pDesc" rows="3" style="width:100%; padding:10px; border-radius:10px;" placeholder="المواصفات..."></textarea>
    <input type="file" id="pImg" accept="image/*">
    <button class="buy-btn" onclick="saveProduct()" style="background:var(--black)">نشر المنتج</button>
</div>

<div class="grid" id="productGrid"></div>

<div id="cartModal" class="modal">
    <div class="modal-content">
        <h3 style="color:var(--red); text-align:center;"><i class="fas fa-shopping-cart"></i> سلة المشتريات</h3>
        <div id="cartItemsList"></div>
        <hr>
        <div style="display:flex; justify-content: space-between; font-weight:bold; margin:15px 0;">
            <span>الإجمالي:</span>
            <span id="totalPriceDisplay">0</span>
        </div>
        <input type="text" id="custName" placeholder="الاسم الكامل">
        <input type="tel" id="custPhone" placeholder="رقم الهاتف">
        <input type="text" id="custAddr" placeholder="العنوان">
        <button class="buy-btn" onclick="sendOrderWhatsApp()">تأكيد الطلب عبر واتساب <i class="fab fa-whatsapp"></i></button>
        <button onclick="closeCart()" style="width:100%; border:none; background:none; margin-top:10px; color:#999; cursor:pointer;">إلغاء</button>
    </div>
</div>

<footer>
    <h3>تواصل معنا</h3>
    <div class="social-icons">
        <a href="https://www.facebook.com/hmtarostore1" target="_blank" class="fb"><i class="fab fa-facebook"></i></a>
        <a href="https://www.instagram.com/hmtarostore1?igsh=b3cwM2xzeDJ0ZnZi" target="_blank" class="ig"><i class="fab fa-instagram"></i></a>
        <a href="https://www.tiktok.com/@hamtaro_store1?_r=1&_t=ZS-95mdhr2zViC" target="_blank" class="tk"><i class="fab fa-tiktok"></i></a>
    </div>
    <p class="copyright">© 2026 جميع الحقوق محفوظة لمتجر همتارو</p>
</footer>

<script>
    // Firebase Config (Your data)
    const firebaseConfig = {
        apiKey: "AIzaSyBzN_CgWWoZD_7GbKe7VMyWZRWq2K3tBXE",
        authDomain: "hamtarostore-24916.firebaseapp.com",
        databaseURL: "https://hamtarostore-24916-default-rtdb.firebaseio.com",
        projectId: "hamtarostore-24916",
        storageBucket: "hamtarostore-24916.firebasestorage.app",
        messagingSenderId: "782622457282",
        appId: "1:782622457282:web:eadab0227b91b6b199aa5b"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    let allProducts = {};
    let cart = [];

    db.ref('products').on('value', (snapshot) => {
        document.getElementById('loading').style.display = 'none';
        allProducts = snapshot.val() || {};
        renderProducts();
    });

    function renderProducts() {
        const grid = document.getElementById('productGrid');
        grid.innerHTML = "";
        Object.keys(allProducts).reverse().forEach(id => {
            const p = allProducts[id];
            grid.innerHTML += `
                <div class="card">
                    <img src="${p.img}">
                    <div class="card-info">
                        <div style="font-weight:700; height:40px; overflow:hidden">${p.name}</div>
                        <div class="price">${p.price} ج.س</div>
                        <button class="buy-btn" onclick="addToCart('${id}')">إضافة للسلة <i class="fas fa-cart-plus"></i></button>
                    </div>
                </div>`;
        });
    }

    function addToCart(id) {
        const p = allProducts[id];
        cart.push({name: p.name, price: p.price});
        updateCartUI();
        alert("تمت إضافة " + p.name + " إلى السلة ✅");
    }

    function updateCartUI() {
        document.getElementById('cartCount').innerText = cart.length;
        const list = document.getElementById('cartItemsList');
        let total = 0;
        list.innerHTML = "";
        cart.forEach((item, index) => {
            total += parseFloat(item.price);
            list.innerHTML += `<div style="display:flex; justify-content:space-between; margin-bottom:10px;">
                <span>${item.name}</span>
                <span>${item.price} ج.س <i class="fas fa-trash" style="color:red; cursor:pointer; margin-right:10px" onclick="removeFromCart(${index})"></i></span>
            </div>`;
        });
        document.getElementById('totalPriceDisplay').innerText = total + " ج.س";
    }

    function removeFromCart(index) {
        cart.splice(index, 1);
        updateCartUI();
    }

    function showCart() { document.getElementById('cartModal').style.display = 'flex'; }
    function closeCart() { document.getElementById('cartModal').style.display = 'none'; }

    function sendOrderWhatsApp() {
        const name = document.getElementById('custName').value;
        const phone = document.getElementById('custPhone').value;
        const addr = document.getElementById('custAddr').value;

        if(!name || !phone || !addr || cart.length === 0) return alert("الرجاء إكمال البيانات وإضافة منتجات للسلة");

        let itemsText = "";
        let total = 0;
        cart.forEach((item, i) => {
            itemsText += `${i+1}- ${item.name} (${item.price} ج.س)%0A`;
            total += parseFloat(item.price);
        });

        const msg = `*طلب جديد - Hamtaro Store*%0A` +
                    `--------------------------%0A` +
                    `*العميل:* ${name}%0A*الهاتف:* ${phone}%0A*العنوان:* ${addr}%0A` +
                    `--------------------------%0A` +
                    `*المنتجات:*%0A${itemsText}` +
                    `--------------------------%0A` +
                    `*الإجمالي:* ${total} ج.س`;

        window.open(`https://wa.me/249906848436?text=${msg}`, '_blank');
        cart = []; updateCartUI(); closeCart();
    }

    // Admin Functions
    const secureKey = "Hamtaro@2026"; 
    function askPass() {
        if (prompt("رمز الإدارة:") === secureKey) document.getElementById('adminArea').style.display = 'block';
    }

    function saveProduct() {
        const file = document.getElementById('pImg').files[0];
        const name = document.getElementById('pName').value;
        const price = document.getElementById('pPrice').value;
        if(!file || !name || !price) return alert("أكمل بيانات المنتج");

        const reader = new FileReader();
        reader.onload = function(e) {
            const pData = { name, price, loc: document.getElementById('pLoc').value, desc: document.getElementById('pDesc').value, img: e.target.result, time: Date.now() };
            db.ref('products').push(pData).then(() => { alert("تم النشر بنجاح!"); location.reload(); });
        };
        reader.readAsDataURL(file);
    }
</script>
</body>
</html>
